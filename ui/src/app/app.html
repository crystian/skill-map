<!--
  Viewport guard: skill-map UI is built for desktop. Below 768px we replace
  the shell with a friendly full-screen message instead of letting the user
  see a broken layout. CSS-only — the overlay is always in the DOM and
  shows itself at narrow widths via media query, so we don't pay a JS /
  matchMedia listener for what the browser already does for free.
-->
<div class="viewport-warning" role="alert" data-testid="viewport-warning">
  <div class="viewport-warning__card">
    <i class="pi pi-desktop viewport-warning__icon" aria-hidden="true"></i>
    <h2 class="viewport-warning__title">{{ texts.viewportWarning.title }}</h2>
    <p class="viewport-warning__subtitle">{{ texts.viewportWarning.subtitle }}</p>
    <p class="viewport-warning__body">{{ texts.viewportWarning.body }}</p>
  </div>
</div>

<div class="shell" data-testid="shell">
  <sm-demo-banner />
  <header class="shell__topbar" data-testid="shell-topbar">
    <div class="shell__brand">
      <span class="shell__brand-mark">sm</span>
      <div>
        <h1>{{ texts.brand }}</h1>
        <p class="shell__tag">{{ texts.tag }}</p>
      </div>
    </div>

    <nav class="shell__nav" [attr.aria-label]="texts.a11y.viewSwitcher" data-testid="shell-nav">
      <a routerLink="/graph" routerLinkActive="is-active" data-testid="nav-graph">{{ texts.nav.graph }}</a>
      <a routerLink="/list" routerLinkActive="is-active" data-testid="nav-list">{{ texts.nav.list }}</a>
      <a routerLink="/inspector" routerLinkActive="is-active" data-testid="nav-inspector">{{ texts.nav.inspector }}</a>
    </nav>

    <div class="shell__actions">
      <p-button
        [icon]="themeIcon()"
        [ariaLabel]="themeLabel()"
        [pTooltip]="themeTooltip()"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        size="small"
        (onClick)="toggleTheme()"
        data-testid="action-theme-toggle"
      />
      <div class="shell__badge" aria-live="polite" data-testid="shell-nodes-badge">
        <strong>{{ count() }}</strong> {{ texts.badge.nodes }}
      </div>
    </div>
  </header>

  <main class="shell__main">
    <router-outlet />
  </main>
</div>
