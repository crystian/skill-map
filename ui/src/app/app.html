<div class="shell">
  <header class="shell__topbar">
    <div class="shell__brand">
      <span class="shell__brand-mark">sm</span>
      <div>
        <h1>skill-map</h1>
        <p class="shell__tag">ui prototype · Step 0c</p>
      </div>
    </div>

    <nav class="shell__nav" aria-label="View switcher">
      <a routerLink="/list" routerLinkActive="is-active">List</a>
      <a routerLink="/graph" routerLinkActive="is-active">Graph</a>
      <a routerLink="/inspector" routerLinkActive="is-active">Inspector</a>
    </nav>

    <div class="shell__actions">
      <p-button
        label="Simulate scan"
        icon="pi pi-play"
        severity="secondary"
        [outlined]="true"
        size="small"
        [disabled]="scanRunning()"
        [loading]="scanRunning()"
        (onClick)="simulateScan()"
      />
      <p-button
        [icon]="themeIcon()"
        [ariaLabel]="themeLabel()"
        severity="secondary"
        [text]="true"
        [rounded]="true"
        size="small"
        (onClick)="toggleTheme()"
      />
      <div class="shell__badge" aria-live="polite">
        <strong>{{ count() }}</strong> nodes
      </div>
    </div>
  </header>

  <main class="shell__main">
    <router-outlet />
  </main>

  <app-event-log />
</div>
