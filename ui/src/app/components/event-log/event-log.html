<aside class="eventlog" [class.is-expanded]="expanded()" data-testid="event-log">
  <header class="eventlog__handle-row">
    <p-togglebutton
      [ngModel]="expanded()"
      (ngModelChange)="setExpanded($event)"
      [ariaLabel]="expanded() ? texts.a11y.collapse : texts.a11y.expand"
      styleClass="eventlog__handle"
      data-testid="event-log-handle"
    >
      <ng-template #content>
        <span class="pi" [class.pi-chevron-down]="expanded()" [class.pi-chevron-up]="!expanded()"></span>
        <strong>{{ texts.title }}</strong>
      </ng-template>
    </p-togglebutton>
  </header>

  @if (expanded()) {
    <div class="eventlog__body">
      <div class="eventlog__empty-state" data-testid="event-log-empty">
        <span class="pi pi-inbox"></span>
        {{ texts.emptyState }}
      </div>
    </div>
  }
</aside>
