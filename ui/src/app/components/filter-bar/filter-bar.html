<div class="filter-bar" data-testid="filter-bar">
  <p-iconfield iconPosition="left" class="filter-bar__search">
    <p-inputicon styleClass="pi pi-search" />
    <input
      pInputText
      type="text"
      [placeholder]="texts.searchPlaceholder"
      [ngModel]="searchText()"
      (ngModelChange)="onSearchChange($event)"
      data-testid="filter-search"
    />
  </p-iconfield>

  @if (showKinds()) {
    <p-multiselect
      [options]="kindOptions"
      [ngModel]="selectedKinds()"
      (ngModelChange)="onKindsChange($event)"
      optionLabel="label"
      optionValue="value"
      [placeholder]="texts.allKindsPlaceholder"
      display="chip"
      styleClass="filter-bar__ms"
      [showToggleAll]="false"
      [filter]="false"
      data-testid="filter-kinds"
    />
  }

  <p-multiselect
    [options]="stabilityOptions"
    [ngModel]="selectedStabilities()"
    (ngModelChange)="onStabilitiesChange($event)"
    optionLabel="label"
    optionValue="value"
    [placeholder]="texts.allStabilitiesPlaceholder"
    display="chip"
    styleClass="filter-bar__ms"
    [showToggleAll]="false"
    [filter]="false"
    data-testid="filter-stabilities"
  />

  <p-togglebutton
    [ngModel]="hasIssuesOnly()"
    (ngModelChange)="onIssuesToggle($event)"
    [onLabel]="texts.hasIssues"
    [offLabel]="texts.hasIssues"
    onIcon="pi pi-exclamation-triangle"
    offIcon="pi pi-exclamation-triangle"
    styleClass="filter-bar__toggle"
    data-testid="filter-has-issues"
  />

  @if (isActive()) {
    <p-button
      [label]="texts.reset"
      severity="secondary"
      [text]="true"
      size="small"
      (onClick)="reset()"
      data-testid="filter-reset"
    />
  }
</div>
