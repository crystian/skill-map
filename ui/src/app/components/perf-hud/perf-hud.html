<button
  type="button"
  class="perf-hud"
  [attr.aria-label]="expanded() ? 'Collapse performance HUD' : 'Expand performance HUD'"
  [attr.aria-expanded]="expanded()"
  (click)="toggle()"
>
  <span class="perf-hud__cell">{{ fps() }} fps</span>

  @if (expanded()) {
    <canvas #sparkline class="perf-hud__sparkline" aria-hidden="true"></canvas>
    <span class="perf-hud__sep" aria-hidden="true">·</span>
    <span class="perf-hud__cell">{{ frameTimeMs() }}ms</span>
    @if (hasHeap()) {
      <span class="perf-hud__sep" aria-hidden="true">·</span>
      <span class="perf-hud__cell">{{ heapMb() }} MB</span>
    }
    <span class="perf-hud__sep" aria-hidden="true">·</span>
    <span class="perf-hud__cell">{{ longTasks() }} long</span>
    <span class="perf-hud__sep" aria-hidden="true">·</span>
    <span class="perf-hud__cell">{{ domNodes() }} dom</span>
    <span class="perf-hud__sep" aria-hidden="true">·</span>
    <span class="perf-hud__cell">{{ visible() }}/{{ total() }} nodes</span>
    <span class="perf-hud__sep" aria-hidden="true">·</span>
    <span class="perf-hud__cell">{{ edges() }} edges</span>
    @if (cacheAgeSec() !== null) {
      <span class="perf-hud__sep" aria-hidden="true">·</span>
      <span class="perf-hud__cell">cache {{ cacheAgeSec() }}s</span>
    }
  }
</button>
