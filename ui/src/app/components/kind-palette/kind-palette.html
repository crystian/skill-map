<div class="kind-palette" role="toolbar" [attr.aria-label]="texts.a11y.toolbarLabel" data-testid="kind-palette">
  @for (entry of entries(); track entry.kind) {
    <p-togglebutton
      [ngModel]="isActive(entry.kind)"
      (ngModelChange)="toggle(entry.kind)"
      [onIcon]="entry.icon"
      [offIcon]="entry.icon"
      [onLabel]="entry.count.toString()"
      [offLabel]="entry.count.toString()"
      [pTooltip]="entry.label"
      [styleClass]="'kind-palette__btn kind-palette__btn--' + entry.kind"
      [attr.data-testid]="'kind-palette-' + entry.kind"
    />
  }
</div>
