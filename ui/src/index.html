<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>skill-map · ui prototype</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Runtime-mode discriminator. `live` makes the SPA talk to the BFF
      (`sm serve`); the demo build pipeline (Step 14.3.b) rewrites
      `content` to `demo` and bundles a precomputed snapshot alongside.
    -->
    <meta name="skill-map-mode" content="live" />
    <!--
      Adaptive SVG favicon: the file carries an inline `prefers-color-scheme`
      <style> block that flips strokes/fills between dark and light browser
      tabs. The PNG entry is a last-resort fallback for ancient clients that
      don't render SVG favicons. Mirrors web/index.html so the SPA and the
      marketing site share one source of truth.
    -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
