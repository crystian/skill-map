name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate spec + integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Parse-check every JSON schema
        run: |
          fail=0
          while IFS= read -r f; do
            if ! node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" 2>/dev/null; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(find spec/schemas -name '*.schema.json')
          exit $fail

      - name: Verify spec index integrity (sha256 per file)
        run: node scripts/build-spec-index.mjs --check

      - name: Build site + validate $id alignment
        run: node scripts/build-site.mjs

  build-test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck --workspace=skill-map

      - name: Build (tsup)
        run: npm run build --workspace=skill-map

      - name: Test
        run: npm run test:ci --workspace=skill-map

  changeset:
    name: require changeset on PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Check for changeset
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: node scripts/check-changeset.mjs "origin/${BASE_REF}"
