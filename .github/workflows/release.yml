name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build UI
        # The CLI publish step depends on the Angular SPA being built so
        # tsup's onSuccess hook can copy `ui/dist/ui/browser/` into
        # `src/dist/ui/`. The runtime resolver in `src/server/paths.ts`
        # serves the bundle from there in installed mode; without this
        # step the published tarball would ship without any UI and
        # `sm` would render the placeholder forever.
        run: npm run build --workspace=ui

      - name: Build CLI
        run: npm run build

      - name: Verify spec index is up to date
        run: node scripts/build-spec-index.js --check

      - name: Changesets — version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run changeset:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke install from npm (post-publish)
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Allow npm registry propagation before pulling the freshly
          # published versions. The publish itself just returned, but the
          # CDN can lag a few seconds before the new tag resolves.
          sleep 60
          npm i -g @skill-map/cli@latest
          sm --version
          skill-map --version
          sm --help > /dev/null
